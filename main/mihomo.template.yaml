# ============================================================
# Mihomo 统一配置模板
# 策略约束:
# - 不做国家分组
# - 不做测速自动切换
# - 只暴露 6 个单节点供手动选择
# - 上层仅保留 Apple / Telegram / Google / AI / 18comic / dlsite / Steam 服务组
# - 规则集与 sing-box 保持同仓库，仅从 MetaCubeX/meta-rules-dat 的 meta 分支拉取
# ============================================================

mixed-port: 7891
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

external-controller: 127.0.0.1:9090
secret: "${CLASH_API_SECRET}"

profile:
  store-selected: true
  store-fake-ip: false

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - tls://8.8.4.4
  proxy-server-nameserver:
    - https://doh.pub/dns-query

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: false
  mtu: 9000
  route-exclude-address:
    - 173.73.48.0/24
    - 10.42.0.0/24
    - 150.50.11.22/32
    - 150.50.13.11/32
    - 150.50.13.13/32
    - 175.11.5.2/32
    - 175.13.1.2/32
    - 175.13.1.3/32
  # iOS 主用场景不做应用级排除；包名级排除属于 Android 能力。
  # Linux 如需 tun 层排除，请改用 exclude-uid / exclude-uid-range。

proxy-providers:
  justmysocks:
    type: http
    url: "${SUB_URL_1}"
    path: ./providers/justmysocks.yaml
    interval: 43200
    proxy: DIRECT
    health-check:
      enable: false

proxy-groups:
  - name: 🔰 节点选择
    type: select
    proxies:
      - 🇯🇵 JP s4 Fast
      - 🇳🇱 EU s5
      - 🇺🇸 LA s3
      - 🇺🇸 LA s2
      - 🇺🇸 LA s1
      - 📦 Bulk s801
      - DIRECT

  - name: 🇺🇸 LA s1
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s1\\b"

  - name: 🇺🇸 LA s2
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s2\\b"

  - name: 🇺🇸 LA s3
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s3\\b"

  - name: 🇯🇵 JP s4 Fast
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s4\\b"

  - name: 🇳🇱 EU s5
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s5\\b"

  - name: 📦 Bulk s801
    type: select
    use:
      - justmysocks
    filter: "(?i)c62s801\\b"

  - &service_group
    name: 🍎 Apple
    type: select
    proxies:
      - 🔰 节点选择
      - 🇯🇵 JP s4 Fast
      - 🇳🇱 EU s5
      - 🇺🇸 LA s3
      - 🇺🇸 LA s2
      - 🇺🇸 LA s1
      - 📦 Bulk s801
      - DIRECT

  - <<: *service_group
    name: 📲 Telegram

  - <<: *service_group
    name: 🔎 Google

  - <<: *service_group
    name: 🤖 AI

  - <<: *service_group
    name: 🔞 18comic

  - <<: *service_group
    name: 🎮 dlsite

  - <<: *service_group
    name: 🎮 Steam

